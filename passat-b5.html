ie '+(idx+1)+'/10';$('#bar').style.width=((idx+1)*10)+'%';$('#q').textContent=qs[idx].q;$('#answers').innerHTML='';qs[idx].a.forEach((t,i)=>{let b=document.createElement('button');b.className='answer';b.type='button';b.innerHTML='<span>'+letters[i]+'</span><span>'+t+'</span>';b.onclick=()=>choose(i,b);$('#answers').appendChild(b)})}function choose(i,b){if(lock)return;lock=true;let all=[...document.querySelectorAll('.answer')];if(i===qs[idx].c){score++;b.classList.add('correct')}else b.classList.add('wrong');all.forEach(x=>x.disabled=true);setTimeout(()=>{idx++;idx<10?render():finish()},320)}function finish(){$('#quiz').classList.add('completed');$('#result').classList.add('show');$('#counter').textContent='Koniec quizu';$('#title').textContent=score===10?'Wynik perfekcyjny':'Twój wynik';$('#scoreText').textContent='Poprawne odpowiedzi: '+score+'/10';$('#coupon').innerHTML=score===10?`<form class='coupon-form' id='couponForm'><label for='mail'>Gratulacje. Podaj e-mail, a wyślemy Ci kod rabatowy 30%.</label><div class='coupon-row'><input class='coupon-input' id='mail' type='text' inputmode='email' autocomplete='email' placeholder='adres@email.pl' required><button class='coupon-button' type='submit'>Odbierz kupon</button></div><p class='status' id='status'></p></form>`:`<p class='coupon'>Kupon e-mail jest dostępny tylko przy wyniku 10/10.</p>`;if(score===10)mail()}function mail(){let f=$('#couponForm'),m=$('#mail'),s=$('#status'),b=f.querySelector('button');f.onsubmit=async e=>{e.preventDefault();let email=m.value.trim();if(!email.includes('@')||!email.includes('.')){s.textContent='Wpisz poprawny adres e-mail.';s.className='status err';return}b.disabled=true;b.textContent='Wysyłanie...';try{let d=new Date();let end=new Date(d.getFullYear(),d.getMonth()+1,0).toLocaleDateString('pl-PL');await emailjs.send(cfg.serviceId,cfg.templateId,{to_email:email,user_email:email,coupon_code:'GKSARK#$#30',score:10,total:10,valid_until:end},{publicKey:cfg.publicKey});s.textContent='Kup
