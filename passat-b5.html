<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quiz: znajomość Passata B5</title>
  <style>
    :root{color-scheme:dark;--navy:#03133a;--blue:#075bc9;--gold:#ffd35a;--gold-dark:#b57711;--cream:#fff8df;--ink:#111827;--red:#e33830;--green:#24d17e;--white:#fff}*{box-sizing:border-box}body{min-height:100vh;margin:0;font-family:Arial,Helvetica,sans-serif;color:var(--white);background:linear-gradient(180deg,rgba(3,19,58,.94),rgba(2,9,29,.98)),url("quiz-show-car.png") center top/cover fixed}button{font:inherit}.page{min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:clamp(10px,3vw,28px)}.app{width:min(1120px,100%);min-height:700px;display:grid;grid-template-columns:minmax(330px,.95fr) minmax(380px,1.05fr);overflow:hidden;border:3px solid rgba(255,211,90,.9);border-radius:18px;background:rgba(3,19,58,.92);box-shadow:0 28px 90px rgba(0,0,0,.48)}.visual{position:relative;min-height:700px;background:linear-gradient(180deg,rgba(5,37,99,.03),rgba(1,8,27,.72)),url("quiz-show-car.png") center top/cover no-repeat}.visual:after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(3,19,58,0),rgba(3,19,58,.92));pointer-events:none}.quiz{display:flex;flex-direction:column;gap:22px;padding:38px;background:radial-gradient(circle at 15% 0%,rgba(255,211,90,.16),transparent 32%),linear-gradient(180deg,rgba(6,46,129,.96),rgba(3,18,58,.98))}.topline{display:flex;justify-content:space-between;align-items:center;gap:18px}.kicker{margin:0;color:var(--gold);font-size:.9rem;font-weight:800;text-transform:uppercase}.counter{min-width:116px;padding:9px 14px;border:1px solid rgba(255,211,90,.55);border-radius:999px;color:var(--cream);font-size:.95rem;font-weight:800;text-align:center;background:rgba(255,255,255,.08)}h1{margin:0;color:var(--white);font-size:2.35rem;line-height:1.05;letter-spacing:0}.progress{height:12px;overflow:hidden;border:1px solid rgba(255,211,90,.55);border-radius:999px;background:rgba(2,8,26,.55)}.progress span{display:block;width:10%;height:100%;border-radius:inherit;background:linear-gradient(90deg,var(--gold),#ff8b32);transition:width .22s ease}.question-box{min-height:150px;display:flex;align-items:center;padding:24px;border:2px solid var(--gold);border-radius:12px;color:var(--ink);background:var(--cream);box-shadow:inset 0 0 0 3px rgba(181,119,17,.2)}.question{margin:0;font-size:1.35rem;font-weight:900;line-height:1.35}.answers{display:grid;gap:14px}.answer{min-height:68px;display:grid;grid-template-columns:64px 1fr;align-items:stretch;padding:0;overflow:hidden;border:2px solid var(--gold);border-radius:12px;color:var(--ink);cursor:pointer;background:var(--cream);box-shadow:0 10px 0 rgba(0,0,0,.18);transition:transform .14s ease,box-shadow .14s ease,border-color .14s ease}.answer:hover,.answer:focus-visible{transform:translateY(-2px);border-color:#fff;box-shadow:0 13px 0 rgba(0,0,0,.2);outline:none}.answer:disabled{cursor:default;opacity:.9}.answer .letter{display:grid;place-items:center;color:var(--navy);background:var(--gold);font-size:1.85rem;font-weight:900}.answer .text{display:flex;align-items:center;padding:14px 18px;font-size:1rem;font-weight:800;line-height:1.28;text-align:left}.answer.correct{border-color:var(--green);background:#eafff3}.answer.wrong{border-color:var(--red);background:#fff0ef}.result{display:none;flex:1;align-content:center;gap:18px;min-height:430px}.result.show{display:grid}.result-panel{padding:28px;border:2px solid var(--gold);border-radius:14px;color:var(--ink);background:var(--cream);box-shadow:inset 0 0 0 3px rgba(181,119,17,.2)}.result h2{margin:0 0 10px;color:var(--navy);font-size:2rem;line-height:1.15;letter-spacing:0}.score{margin:0 0 18px;font-size:1.18rem;font-weight:900}.coupon{margin:18px 0 0;padding:18px;border:2px dashed var(--gold-dark);border-radius:12px;background:#fff;color:var(--navy);font-size:1.06rem;font-weight:900;line-height:1.45}.coupon-form{margin:18px 0 0;padding:18px;border:2px dashed var(--gold-dark);border-radius:12px;background:#fff;color:var(--navy);font-weight:900;line-height:1.45}.coupon-label{display:block;margin:0 0 10px;font-size:1rem}.coupon-row{display:grid;grid-template-columns:1fr auto;gap:10px}.coupon-input{min-height:50px;width:100%;border:2px solid rgba(3,19,58,.25);border-radius:9px;padding:0 14px;color:var(--ink);background:#fffdf5;font:inherit;font-size:1rem;font-weight:700}.coupon-input:focus{border-color:var(--blue);outline:3px solid rgba(7,91,201,.16)}.coupon-button{min-height:50px;border:0;border-radius:9px;padding:0 16px;color:#fff;background:var(--red);font-weight:900;cursor:pointer;white-space:nowrap}.coupon-button:disabled{cursor:wait;opacity:.65}.mail-status{min-height:24px;margin:12px 0 0;color:var(--navy);font-size:.95rem;font-weight:800}.mail-status.success{color:#08713f}.mail-status.error{color:#b91c1c}.retry{min-height:54px;width:max-content;max-width:100%;padding:0 20px;border:0;border-radius:10px;color:var(--navy);background:var(--gold);font-weight:900;cursor:pointer;box-shadow:0 9px 0 rgba(0,0,0,.22)}.retry:hover,.retry:focus-visible{outline:2px solid #fff;outline-offset:3px}.quiz.completed .quiz-body,.quiz.completed .progress{display:none}@media(max-width:900px){.page{padding:14px}.app{min-height:auto;grid-template-columns:1fr}.visual{min-height:330px;background-position:center 12%}.visual:after{background:linear-gradient(180deg,rgba(3,19,58,0),rgba(3,19,58,.8))}.quiz{padding:24px}h1{font-size:2rem}}@media(max-width:560px){.topline{align-items:flex-start;flex-direction:column}.counter{min-width:100%}h1{font-size:1.65rem}.question-box{min-height:132px;padding:18px}.question{font-size:1.12rem}.answer{min-height:62px;grid-template-columns:52px 1fr}.answer .letter{font-size:1.45rem}.answer .text{padding:12px 14px;font-size:.94rem}.coupon-row{grid-template-columns:1fr}.result-panel{padding:22px}.result h2{font-size:1.58rem}}
  </style>
  <style>
    .cover-app{position:fixed;inset:0;z-index:20;min-height:100dvh;width:100vw;display:flex;align-items:center;justify-content:center;overflow:auto;border:0;border-radius:0;background:#020817;box-shadow:none;padding:clamp(10px,2vw,24px)}
    .cover-frame{width:min(2033px,100%);min-height:calc(100dvh - clamp(20px,4vw,48px));display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(14px,2vw,24px)}
    .cover-image{display:block;width:100%;height:auto;max-height:calc(100dvh - 116px);object-fit:contain;border:2px solid rgba(255,211,90,.72);border-radius:14px;background:#020817;box-shadow:0 24px 80px rgba(0,0,0,.45)}
    .start-button{min-height:60px;width:max-content;max-width:100%;border:0;border-radius:10px;padding:0 34px;color:var(--navy);background:linear-gradient(180deg,#ffe27c,#ffb331);font-size:1.12rem;font-weight:900;cursor:pointer;box-shadow:0 9px 0 rgba(0,0,0,.32);text-transform:uppercase}
    .start-button:hover,.start-button:focus-visible{outline:3px solid #fff;outline-offset:4px}
    .quiz-app[hidden],.cover-app[hidden]{display:none}
    @media(max-width:560px){.cover-app{padding:10px}.cover-frame{min-height:calc(100dvh - 20px);justify-content:flex-start;padding-top:8vh}.cover-image{max-height:calc(100dvh - 146px);border-radius:10px}.start-button{width:100%;font-size:1rem;padding:0 18px}}
  </style>
</head>
<body>
  <main class="page">
    <section class="cover-app" id="coverScreen" aria-label="Okładka quizu Passat B5">
      <div class="cover-frame">
        <img class="cover-image" src="passat-b5-cover.svg?v=4" alt="Sprawdź swoją wiedzę o Passacie B5. Zdobądź 10 na 10 i odbierz kod rabatowy 30 procent.">
        <button class="start-button" id="startQuizButton" type="button">Rozpocznij zabawę</button>
      </div>
    </section>
    <section class="app quiz-app" id="quizApp" aria-label="Quiz o Volkswagenie Passacie B5" hidden>
      <div class="visual" aria-hidden="true"></div>
      <section class="quiz" id="quiz">
        <div class="topline"><p class="kicker">Volkswagen Passat B5</p><div class="counter" id="counter">Pytanie 1/10</div></div>
        <h1>Znajomość Passata B5</h1>
        <div class="progress" aria-hidden="true"><span id="progressBar"></span></div>
        <div class="quiz-body" id="quizBody"><div class="question-box"><p class="question" id="questionText"></p></div><div class="answers" id="answers"></div></div>
        <div class="result" id="result" aria-live="polite"><div class="result-panel"><h2 id="resultTitle"></h2><p class="score" id="scoreText"></p><div id="couponBox"></div></div><button class="retry" id="retryButton" type="button">Zagraj ponownie</button></div>
      </section>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script>
    const baseQuestions=[
      ["Oznaczenie fabryczne Passata B5 przed liftingiem to najczęściej:",["3B","3C","35i","7M"],0],
      ["Passat B5 po liftingu jest często oznaczany jako:",["3BG","3C","B7","Typ 1K"],0],
      ["Układ silnika w Passacie B5 jest charakterystycznie:",["wzdłużny","poprzeczny jak w Golfie IV","centralny","z tyłu"],0],
      ["Przednie zawieszenie Passata B5 jest znane z zastosowania:",["wielowahaczowego układu z kilkoma wahaczami","resorów piórowych","sztywny most","kolumn tylko z jednym dolnym wahaczem"],0],
      ["Wersje 4Motion Passata B5 z silnikiem wzdłużnym korzystają typowo z:",["stałego napędu z centralnym mechanizmem Torsen","sprzęgła Haldex jak w poprzecznych Golfach","napędu tylko na tył","ręcznie dołączanej przedniej osi"],0],
      ["Starszy 1.9 TDI 110 KM w Passacie B5 kojarzy się najczęściej z:",["pompą rotacyjną VP37","common rail drugiej generacji","dwoma gaźnikami","wtryskiem benzyny K-Jetronic"],0],
      ["Nowsze 1.9 TDI PD w Passacie B5/B5 FL oznacza:",["pompowtryskiwacze","gaźnik z ssaniem","wtrysk jednopunktowy","napęd elektryczny"],0],
      ["Silnik 1.8T 20V ma:",["turbodoładowanie i 20 zaworów","20 cylindrów","dieslowski common rail","brak doładowania"],0],
      ["Silnik 2.8 V6 30V oznacza w praktyce:",["V6 z pięcioma zaworami na cylinder","R4 z dwoma zaworami","diesla V6 bez turbosprężarki","silnik Wankla"],0],
      ["W 1.9 TDI pasek rozrządu wymienia się terminowo, bo zerwanie grozi:",["poważnym uszkodzeniem silnika","wyłącznie rozładowaniem akumulatora","zablokowaniem radia","utratą klimatyzacji"],0],
      ["Uszkodzony przepływomierz MAF w TDI często daje objaw:",["braku mocy i słabej reakcji na gaz","zbyt jasnych świateł mijania","wycieku płynu spryskiwaczy","piszczenia zamka drzwi"],0],
      ["Zawór N75 w silnikach turbo odpowiada za:",["sterowanie ciśnieniem doładowania","podgrzewanie foteli","regulację geometrii kół","sterowanie szybami"],0],
      ["Zawór EGR w Passacie B5 służy do:",["recyrkulacji części spalin do dolotu","zwiększania napięcia alternatora","podnoszenia auta na zawieszeniu","zmiany przełożeń skrzyni"],0],
      ["Turbosprężarka VNT w wielu TDI zmienia:",["geometrię kierownic spalin","pojemność skokową silnika","rozstaw śrub felg","liczbę biegów skrzyni"],0],
      ["Stuki z przodu Passata B5 bardzo często wskazują na zużycie:",["wahaczy przedniego zawieszenia","anteny dachowej","przełącznika świateł awaryjnych","podsufitki"],0],
      ["Moduł komfortu w Passacie B5 jest narażony na problemy szczególnie przy:",["zalaniu podłogi i wiązek pod dywanem","braku paliwa w baku","zużyciu żarówki tablicy","przebiciu opony"],0],
      ["Zatkane odpływy podszybia w Passacie B5 mogą powodować:",["dostawanie się wody do kabiny","zwiększenie mocy silnika","zniknięcie luzu w zawieszeniu","samoczynne ustawienie geometrii"],0],
      ["Nieszczelna obudowa filtra kabinowego może skutkować:",["wodą w nogach pasażera","brakiem piątego biegu","uszkodzeniem dyferencjału","wyłączeniem wspomagania"],0],
      ["W silniku 1.8T wypadanie zapłonu może być związane m.in. z:",["cewkami zapłonowymi","pompowtryskiwaczami diesla","resorem piórowym","mechanizmem tylnej wycieraczki sedana"],0],
      ["Zawór DV w 1.8T służy do:",["upuszczenia/recyrkulacji ciśnienia po zamknięciu przepustnicy","sterowania zamkiem klapy","pompowania paliwa z baku","zmiany kąta świateł"],0],
      ["Zalecany płyn chłodniczy z rodziny G12 kojarzy się zwykle z kolorem:",["różowym lub fioletowym","czarnym","przezroczystym jak woda","brązowym od nowości"],0],
      ["Uszkodzony czujnik temperatury płynu może powodować:",["problemy z rozruchem i błędne wskazania temperatury","zmianę rozstawu śrub","pęknięcie felgi","brak świateł stopu zawsze bez błędu"],0],
      ["Automat 01V/Tiptronic w Passacie B5 to skrzynia:",["pięciobiegowa automatyczna","bezstopniowa CVT","dwusprzęgłowa DSG z B5","manualna bez synchronizacji"],0],
      ["Koło dwumasowe w dieslach Passata B5 ma za zadanie:",["tłumić drgania skrętne układu napędowego","chłodzić intercooler","sterować wentylatorem kabiny","ustawiać kąt zapłonu lampą"],0],
      ["Wersje przednionapędowe Passata B5 mają z tyłu zwykle:",["belkę skrętną","sztywny most napędowy","napędzany most z Torsenem","resory piórowe"],0],
      ["Wersje 4Motion mają z tyłu:",["bardziej rozbudowane niezależne zawieszenie","zawsze belkę jak FWD","brak półosi","napęd tylko na przód"],0],
      ["Typowy rozstaw śrub felg Passata B5 to:",["5x112","4x100","5x120","6x139,7"],0],
      ["Czujniki ABS w Passacie B5 mierzą:",["prędkość obrotową kół","temperaturę oleju","poziom płynu spryskiwaczy","ciśnienie w klimatyzacji"],0],
      ["Uszkodzony włącznik świateł stopu może powodować m.in.:",["problemy z kontrolkami i sygnałem hamowania","wzrost ciśnienia turbo","zmianę ET felgi","większą pojemność silnika"],0],
      ["Nieszczelne przewody podciśnienia w TDI mogą powodować:",["tryb awaryjny i brak doładowania","automatyczną wymianę oleju","blokadę radia","przegrzanie żarówki"],0]
    ];
    const prefixes=["Warsztat:","Diagnostyka:","Serwis:","Test techniczny:","Próba drogowa:","Kontrola:","Pomiar:","Naprawa:","Egzamin:","Ekspert:"];
    const emailJsConfig={serviceId:"service_wu2pmyl",templateId:"template_jhht9ba",publicKey:"iu3vmvW35OSv8wBJM"};
    const letters=["A","B","C","D"],quizLength=10,questionBank=prefixes.flatMap((p,pi)=>baseQuestions.map((item,qi)=>({id:`${pi+1}-${qi+1}`,question:`${p} ${item[0]}`,answers:item[1],correct:item[2]})));
    const quiz=document.getElementById("quiz"),counter=document.getElementById("counter"),progressBar=document.getElementById("progressBar"),questionText=document.getElementById("questionText"),answers=document.getElementById("answers"),result=document.getElementById("result"),resultTitle=document.getElementById("resultTitle"),scoreText=document.getElementById("scoreText"),couponBox=document.getElementById("couponBox"),retryButton=document.getElementById("retryButton");
    let questions=pickRandomQuestions(),currentQuestion=0,score=0,locked=false;
    function shuffle(items){const out=[...items];for(let i=out.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[out[i],out[j]]=[out[j],out[i]]}return out}
    function shuffleAnswers(item){const mixed=shuffle(item.answers.map((answer,index)=>({answer,index})));return{...item,answers:mixed.map(entry=>entry.answer),correct:mixed.findIndex(entry=>entry.index===item.correct)}}
    function pickRandomQuestions(){return shuffle(questionBank).slice(0,quizLength).map(shuffleAnswers)}
    function renderQuestion(){const item=questions[currentQuestion];locked=false;quiz.classList.remove("completed");result.classList.remove("show");counter.textContent=`Pytanie ${currentQuestion+1}/${questions.length}`;progressBar.style.width=`${((currentQuestion+1)/questions.length)*100}%`;questionText.textContent=item.question;answers.innerHTML="";item.answers.forEach((answer,index)=>{const button=document.createElement("button");button.className="answer";button.type="button";button.innerHTML=`<span class="letter">${letters[index]}</span><span class="text">${answer}</span>`;button.addEventListener("click",()=>selectAnswer(index,button));answers.appendChild(button)})}
    function selectAnswer(index,button){if(locked)return;locked=true;const item=questions[currentQuestion],isCorrect=index===item.correct,buttons=[...answers.querySelectorAll(".answer")];if(isCorrect){score++;button.classList.add("correct")}else button.classList.add("wrong");buttons.forEach(answerButton=>answerButton.disabled=true);setTimeout(()=>{currentQuestion++;currentQuestion<questions.length?renderQuestion():showResult()},320)}
    function showResult(){quiz.classList.add("completed");result.classList.add("show");counter.textContent="Koniec quizu";resultTitle.textContent=score===questions.length?"Wynik perfekcyjny":"Twój wynik";scoreText.textContent=`Poprawne odpowiedzi: ${score}/${questions.length}`;couponBox.innerHTML=score===questions.length?`<form class="coupon-form" id="couponForm"><label class="coupon-label" for="couponEmail">Gratulacje. Podaj e-mail, a wyślemy Ci kod rabatowy 30%.</label><div class="coupon-row"><input class="coupon-input" id="couponEmail" name="email" type="text" inputmode="email" autocomplete="email" placeholder="adres@email.pl" pattern="^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$" required><button class="coupon-button" type="button">Odbierz kupon</button></div><p class="mail-status" id="mailStatus" aria-live="polite"></p></form>`:`<p class="coupon">Kupon e-mail jest dostępny tylko przy wyniku 10/10.</p>`;if(score===questions.length)setupCouponForm()}
    function getMonthEnd(){const today=new Date(),end=new Date(today.getFullYear(),today.getMonth()+1,0);return end.toLocaleDateString("pl-PL")}
    function setupCouponForm(){const form=document.getElementById("couponForm"),emailInput=document.getElementById("couponEmail"),status=document.getElementById("mailStatus"),button=form.querySelector(".coupon-button");const sendCoupon=async event=>{event.preventDefault();const email=emailInput.value.trim(),emailPattern=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;if(!emailPattern.test(email)){status.textContent="Wpisz poprawny adres e-mail.";status.className="mail-status error";emailInput.focus();return}button.disabled=true;button.textContent="Wysyłanie...";status.textContent="";status.className="mail-status";try{if(!window.emailjs)throw new Error("Nie udało się załadować wysyłki e-mail. Odśwież stronę i spróbuj ponownie.");await emailjs.send(emailJsConfig.serviceId,emailJsConfig.templateId,{to_email:email,user_email:email,coupon_code:"GKSARK#$#30",score,total:questions.length,valid_until:getMonthEnd()},{publicKey:emailJsConfig.publicKey});status.textContent="Kupon został wysłany na podany adres e-mail.";status.className="mail-status success";emailInput.disabled=true;button.textContent="Wysłano"}catch(error){const errorDetails=error.text||error.message||"Spróbuj ponownie.";status.textContent=`Nie udało się wysłać kuponu. ${errorDetails}`;status.className="mail-status error";console.error("EmailJS error",error);button.disabled=false;button.textContent="Odbierz kupon"}};form.addEventListener("submit",sendCoupon);button.addEventListener("click",sendCoupon)}
    retryButton.addEventListener("click",()=>{questions=pickRandomQuestions();currentQuestion=0;score=0;renderQuestion()});
    renderQuestion();
  </script>
  <script>
    document.getElementById("startQuizButton").addEventListener("click",()=>{document.getElementById("coverScreen").hidden=true;document.getElementById("quizApp").hidden=false;window.scrollTo({top:0,behavior:"smooth"})});
  </script>
</body>
</html>
