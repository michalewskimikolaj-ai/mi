<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quiz: niemieckie auta 1990-2000</title>
  <style>
    :root {
      color-scheme: dark;
      --navy: #03133a;
      --blue: #075bc9;
      --gold: #ffd35a;
      --gold-dark: #b57711;
      --cream: #fff8df;
      --ink: #111827;
      --red: #e33830;
      --green: #24d17e;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--white);
      background:
        linear-gradient(180deg, rgba(3, 19, 58, 0.94), rgba(2, 9, 29, 0.98)),
        url("assets/quiz-show-car.png") center top / cover fixed;
    }

    button {
      font: inherit;
    }

    .page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
    }

    .app {
      width: min(1120px, 100%);
      min-height: 700px;
      display: grid;
      grid-template-columns: minmax(330px, 0.95fr) minmax(380px, 1.05fr);
      overflow: hidden;
      border: 3px solid rgba(255, 211, 90, 0.9);
      border-radius: 18px;
      background: rgba(3, 19, 58, 0.92);
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.48);
    }

    .visual {
      position: relative;
      min-height: 700px;
      background:
        linear-gradient(180deg, rgba(5, 37, 99, 0.03), rgba(1, 8, 27, 0.72)),
        url("assets/quiz-show-car.png") center top / cover no-repeat;
    }

    .visual::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(3, 19, 58, 0), rgba(3, 19, 58, 0.92));
      pointer-events: none;
    }

    .quiz {
      display: flex;
      flex-direction: column;
      gap: 22px;
      padding: 38px;
      background:
        radial-gradient(circle at 15% 0%, rgba(255, 211, 90, 0.16), transparent 32%),
        linear-gradient(180deg, rgba(6, 46, 129, 0.96), rgba(3, 18, 58, 0.98));
    }

    .topline {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
    }

    .kicker {
      margin: 0;
      color: var(--gold);
      font-size: 0.9rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .counter {
      min-width: 116px;
      padding: 9px 14px;
      border: 1px solid rgba(255, 211, 90, 0.55);
      border-radius: 999px;
      color: var(--cream);
      font-size: 0.95rem;
      font-weight: 800;
      text-align: center;
      background: rgba(255, 255, 255, 0.08);
    }

    h1 {
      margin: 0;
      color: var(--white);
      font-size: 2.35rem;
      line-height: 1.05;
      letter-spacing: 0;
    }

    .progress {
      height: 12px;
      overflow: hidden;
      border: 1px solid rgba(255, 211, 90, 0.55);
      border-radius: 999px;
      background: rgba(2, 8, 26, 0.55);
    }

    .progress span {
      display: block;
      width: 10%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--gold), #ff8b32);
      transition: width 220ms ease;
    }

    .question-box {
      min-height: 150px;
      display: flex;
      align-items: center;
      padding: 24px;
      border: 2px solid var(--gold);
      border-radius: 12px;
      color: var(--ink);
      background: var(--cream);
      box-shadow: inset 0 0 0 3px rgba(181, 119, 17, 0.2);
    }

    .question {
      margin: 0;
      font-size: 1.35rem;
      font-weight: 900;
      line-height: 1.35;
    }

    .answers {
      display: grid;
      gap: 14px;
    }

    .answer {
      min-height: 68px;
      display: grid;
      grid-template-columns: 64px 1fr;
      align-items: stretch;
      padding: 0;
      overflow: hidden;
      border: 2px solid var(--gold);
      border-radius: 12px;
      color: var(--ink);
      cursor: pointer;
      background: var(--cream);
      box-shadow: 0 10px 0 rgba(0, 0, 0, 0.18);
      transition: transform 140ms ease, box-shadow 140ms ease, border-color 140ms ease;
    }

    .answer:hover,
    .answer:focus-visible {
      transform: translateY(-2px);
      border-color: #ffffff;
      box-shadow: 0 13px 0 rgba(0, 0, 0, 0.2);
      outline: none;
    }

    .answer:disabled {
      cursor: default;
      opacity: 0.9;
    }

    .answer .letter {
      display: grid;
      place-items: center;
      color: var(--navy);
      background: var(--gold);
      font-size: 1.85rem;
      font-weight: 900;
    }

    .answer .text {
      display: flex;
      align-items: center;
      padding: 14px 18px;
      font-size: 1rem;
      font-weight: 800;
      line-height: 1.28;
      text-align: left;
    }

    .answer.correct {
      border-color: var(--green);
      background: #eafff3;
    }

    .answer.wrong {
      border-color: var(--red);
      background: #fff0ef;
    }

    .result {
      display: none;
      flex: 1;
      align-content: center;
      gap: 18px;
      min-height: 430px;
    }

    .result.show {
      display: grid;
    }

    .result-panel {
      padding: 28px;
      border: 2px solid var(--gold);
      border-radius: 14px;
      color: var(--ink);
      background: var(--cream);
      box-shadow: inset 0 0 0 3px rgba(181, 119, 17, 0.2);
    }

    .result h2 {
      margin: 0 0 10px;
      color: var(--navy);
      font-size: 2rem;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .score {
      margin: 0 0 18px;
      font-size: 1.18rem;
      font-weight: 900;
    }

    .coupon {
      margin: 18px 0 0;
      padding: 18px;
      border: 2px dashed var(--gold-dark);
      border-radius: 12px;
      background: #ffffff;
      color: var(--navy);
      font-size: 1.06rem;
      font-weight: 900;
      line-height: 1.45;
    }

    .coupon strong {
      display: inline-block;
      margin-top: 8px;
      padding: 8px 12px;
      border-radius: 8px;
      color: #ffffff;
      background: var(--red);
      letter-spacing: 0;
    }

    .retry {
      min-height: 54px;
      width: max-content;
      max-width: 100%;
      padding: 0 20px;
      border: 0;
      border-radius: 10px;
      color: var(--navy);
      background: var(--gold);
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 9px 0 rgba(0, 0, 0, 0.22);
    }

    .retry:hover,
    .retry:focus-visible {
      outline: 2px solid #ffffff;
      outline-offset: 3px;
    }

    .quiz.completed .quiz-body,
    .quiz.completed .progress {
      display: none;
    }

    @media (max-width: 900px) {
      .page {
        padding: 14px;
      }

      .app {
        min-height: auto;
        grid-template-columns: 1fr;
      }

      .visual {
        min-height: 330px;
        background-position: center 12%;
      }

      .visual::after {
        background: linear-gradient(180deg, rgba(3, 19, 58, 0), rgba(3, 19, 58, 0.8));
      }

      .quiz {
        padding: 24px;
      }

      h1 {
        font-size: 2rem;
      }
    }

    @media (max-width: 560px) {
      .topline {
        align-items: flex-start;
        flex-direction: column;
      }

      .counter {
        min-width: 100%;
      }

      h1 {
        font-size: 1.65rem;
      }

      .question-box {
        min-height: 132px;
        padding: 18px;
      }

      .question {
        font-size: 1.12rem;
      }

      .answer {
        min-height: 62px;
        grid-template-columns: 52px 1fr;
      }

      .answer .letter {
        font-size: 1.45rem;
      }

      .answer .text {
        padding: 12px 14px;
        font-size: 0.94rem;
      }

      .result-panel {
        padding: 22px;
      }

      .result h2 {
        font-size: 1.58rem;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="app" aria-label="Quiz techniczny o niemieckich autach">

        <div class="result" id="result" aria-live="polite">
          <div class="result-panel">
            <h2 id="resultTitle"></h2>
            <p class="score" id="scoreText"></p>
            <div id="couponBox"></div>
          </div>
          <button class="retry" id="retryButton" type="button">Zagraj ponownie</button>
        </div>
      </section>
    </section>
  </main>

    const questionPrefixes = [
      "Warsztat:",
      "Diagnostyka:",
      "Serwis:",
      "Test techniczny:",
      "Próba drogowa:"
    ];
    const quizLength = 10;
    const questionBank = buildQuestionBank();
    let questions = pickRandomQuestions(questionBank, quizLength);

    const letters = ["A", "B", "C", "D"];
    const quiz = document.getElementById("quiz");
    const counter = document.getElementById("counter");
    const progressBar = document.getElementById("progressBar");
    const questionText = document.getElementById("questionText");
    const answers = document.getElementById("answers");
    const result = document.getElementById("result");
    const resultTitle = document.getElementById("resultTitle");
    const scoreText = document.getElementById("scoreText");
    const couponBox = document.getElementById("couponBox");
    const retryButton = document.getElementById("retryButton");

    let currentQuestion = 0;
    let score = 0;
    let locked = false;

    function buildQuestionBank() {
      return questionPrefixes.flatMap((prefix, prefixIndex) =>
        baseQuestions.map((item, questionIndex) => ({
          ...item,
          id: `${prefixIndex + 1}-${questionIndex + 1}`,
          question: `${prefix} ${item.question}`
        }))
      );
    }

    function shuffleItems(items) {
      const shuffled = [...items];

      for (let index = shuffled.length - 1; index > 0; index -= 1) {
        const randomIndex = Math.floor(Math.random() * (index + 1));
        [shuffled[index], shuffled[randomIndex]] = [shuffled[randomIndex], shuffled[index]];
      }

      return shuffled;
    }

    function shuffleAnswers(item) {
      const mixedAnswers = shuffleItems(
        item.answers.map((answer, index) => ({
          answer,
          originalIndex: index
        }))
      );

      return {
        ...item,
        answers: mixedAnswers.map((entry) => entry.answer),
        correct: mixedAnswers.findIndex((entry) => entry.originalIndex === item.correct)
      };
    }

    function pickRandomQuestions(pool, amount) {
      return shuffleItems(pool).slice(0, amount).map(shuffleAnswers);
    }

    function renderQuestion() {
      const item = questions[currentQuestion];
      locked = false;
      quiz.classList.remove("completed");
      result.classList.remove("show");
      counter.textContent = `Pytanie ${currentQuestion + 1}/${questions.length}`;
      progressBar.style.width = `${((currentQuestion + 1) / questions.length) * 100}%`;
      questionText.textContent = item.question;
      answers.innerHTML = "";

      item.answers.forEach((answer, index) => {
        const button = document.createElement("button");
        button.className = "answer";
        button.type = "button";
        button.innerHTML = `
          <span class="letter">${letters[index]}</span>
          <span class="text">${answer}</span>
        `;
        button.addEventListener("click", () => selectAnswer(index, button));
        answers.appendChild(button);
      });
    }

    function selectAnswer(index, button) {
      if (locked) {
        return;
      }

      locked = true;
      const item = questions[currentQuestion];
      const isCorrect = index === item.correct;
      const buttons = [...answers.querySelectorAll(".answer")];

      if (isCorrect) {
        score += 1;
        button.classList.add("correct");
      } else {
        button.classList.add("wrong");
      }

      buttons.forEach((answerButton) => {
        answerButton.disabled = true;
      });

      setTimeout(() => {
        currentQuestion += 1;
        if (currentQuestion < questions.length) {
          renderQuestion();
        } else {
          showResult();
        }
      }, 320);
    }

    function showResult() {
      quiz.classList.add("completed");
      result.classList.add("show");
      counter.textContent = "Koniec quizu";
      resultTitle.textContent = score === questions.length ? "Wynik perfekcyjny" : "Twój wynik";
      scoreText.textContent = `Poprawne odpowiedzi: ${score}/${questions.length}`;

      if (score === questions.length) {
        couponBox.innerHTML = `
          <p class="coupon">
            Gratulacje, otrzymujesz kod rabatowy 30% o treści
            <strong>GKSARK#$#30</strong>
            do wykorzystania do końca miesiąca.
          </p>
        `;
      } else {
        couponBox.innerHTML = `
          <p class="coupon">
            Kod rabatowy pojawia się tylko przy wyniku 10/10.
          </p>
        `;
      }
    }

    retryButton.addEventListener("click", () => {
      questions = pickRandomQuestions(questionBank, quizLength);
      currentQuestion = 0;
      score = 0;
      renderQuestion();
    });

    renderQuestion();
  </script>
